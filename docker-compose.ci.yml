services:
  ci:
    build:
      context: .
      dockerfile: Dockerfile.ci
    image: shop-api-ci:latest
    command: ["/bin/bash", "/app/ci.sh"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=shop_test;Username=shop;Password=shop

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 3s
      timeout: 3s
      retries: 5
